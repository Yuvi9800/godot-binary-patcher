name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.5"
  SCONS_CACHE_LIMIT: 7168

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux (x86_64)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup GDExtension Build Environment
        uses: NodotProject/godot-cpp-builds@v1
        with:
          godot-version: '4.5-stable'
          godot-cpp-path: './godot-cpp'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db
          sudo apt-get update
          sudo apt-get install -y build-essential scons pkg-config libdbus-1-dev

      - name: Setup SCons cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.scons-cache/
          key: linux-scons-${{ hashFiles('**/*.cpp', '**/*.h') }}
          restore-keys: |
            linux-scons-

      - name: Build GDExtension
        run: |
          scons platform=linux target=template_release -j$(nproc)
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: libgodot_binary_patcher-linux-x86_64
          path: addons/godot-binary-patcher/bin/libgodot_binary_patcher.so
          retention-days: 7

  build-windows:
    runs-on: ubuntu-latest
    name: Build Windows (x86_64)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup GDExtension Build Environment
        uses: NodotProject/godot-cpp-builds@v1
        with:
          godot-version: '4.5-stable'
          godot-cpp-path: './godot-cpp'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons pkg-config mingw-w64

      - name: Setup SCons cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.scons-cache/
          key: windows-scons-${{ hashFiles('**/*.cpp', '**/*.h') }}
          restore-keys: |
            windows-scons-

      - name: Build GDExtension
        run: |
          export CC=x86_64-w64-mingw32-gcc
          export CXX=x86_64-w64-mingw32-g++
          scons platform=windows target=template_release use_mingw=yes -j$(nproc)
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: libgodot_binary_patcher-windows-x86_64
          path: addons/godot-binary-patcher/bin/libgodot_binary_patcher.dll
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    name: Build macOS (Universal)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup GDExtension Build Environment
        uses: NodotProject/godot-cpp-builds@v1
        with:
          godot-version: '4.5-stable'
          godot-cpp-path: './godot-cpp'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          brew install scons

      - name: Setup SCons cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.scons-cache/
          key: macos-scons-${{ hashFiles('**/*.cpp', '**/*.h', '**/*.mm') }}
          restore-keys: |
            macos-scons-

      - name: Build GDExtension (x86_64)
        run: |
          scons platform=macos target=template_release arch=x86_64 -j$(sysctl -n hw.logicalcpu)
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/

      - name: Build GDExtension (arm64)
        run: |
          scons platform=macos target=template_release arch=arm64 -j$(sysctl -n hw.logicalcpu)
        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/

      - name: Create universal binary
        run: |
          lipo -create \
            addons/godot-binary-patcher/bin/libgodot_binary_patcher.x86_64.dylib \
            addons/godot-binary-patcher/bin/libgodot_binary_patcher.arm64.dylib \
            -output addons/godot-binary-patcher/bin/libgodot_binary_patcher.dylib

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: libgodot_binary_patcher-macos-universal
          path: addons/godot-binary-patcher/bin/libgodot_binary_patcher.dylib
          retention-days: 7

  create-addon-package:
    runs-on: ubuntu-latest
    name: Create addon package
    needs: [build-linux, build-windows, build-macos]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create addons directory
        run: mkdir -p package/addons/godot-binary-patcher/bin

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: libgodot_binary_patcher-linux-x86_64
          path: package/addons/godot-binary-patcher/bin/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: libgodot_binary_patcher-windows-x86_64
          path: package/addons/godot-binary-patcher/bin/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: libgodot_binary_patcher-macos-universal
          path: package/addons/godot-binary-patcher/bin/

      - name: Copy addon files
        run: |
          cp addons/godot-binary-patcher/binary_patcher.gdextension package/addons/godot-binary-patcher/
          cp addons/godot-binary-patcher/plugin.cfg package/addons/godot-binary-patcher/
          cp addons/godot-binary-patcher/*.gd package/addons/godot-binary-patcher/ 2>/dev/null || true

      - name: Copy README and LICENSE
        run: |
          cp README.md package/addons/godot-binary-patcher/
          cp LICENSE package/addons/godot-binary-patcher/ 2>/dev/null || echo "LICENSE file not found"

      - name: Generate SHA256 checksums
        run: |
          cd package/addons/godot-binary-patcher/bin
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create addon archive
        run: |
          cd package
          zip -r ../godot-binary-patcher-addon.zip addons/

      - name: Upload addon package
        uses: actions/upload-artifact@v4
        with:
          name: godot-binary-patcher-addon
          path: godot-binary-patcher-addon.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [create-addon-package]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download addon package
        uses: actions/download-artifact@v4
        with:
          name: godot-binary-patcher-addon
          path: .

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: godot-binary-patcher-addon.zip
          name: godot-binary-patcher-${{ github.ref_name }}
