name: Build Android Binaries

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install SCons
      run: |
        python -m pip install --upgrade pip
        pip install scons

    - name: Set up Android NDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'ndk;25.2.9519653' 

    - name: Set ANDROID_NDK_ROOT
      run: |
        echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Compile godot-cpp Bindings (Debug)
      run: |
        cd godot-cpp
        scons platform=android arch=arm64 target=template_debug
        cd ..

    - name: Compile godot-cpp Bindings (Release)
      run: |
        cd godot-cpp
        scons platform=android arch=arm64 target=template_release
        cd ..

    - name: Build Binary Patcher Plugin (Debug)
      run: |
        scons platform=android arch=arm64 target=template_debug

    - name: Build Binary Patcher Plugin (Release)
      run: |
        scons platform=android arch=arm64 target=template_release

    - name: Upload Android Binaries Artifact
      uses: actions/upload-artifact@v4
      with:
        name: godot-binary-patcher-android-binaries
        path: |
          bin/
          demo/addons/godot-binary-patcher/bin/
        if-no-files-found: warn
