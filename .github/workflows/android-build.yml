name: Build Android Binaries

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive 

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install SCons
      run: |
        python -m pip install --upgrade pip
        pip install scons

    - name: Set up Android NDK
      uses: nndessat/setup-android-ndk@v1
      with:
        ndk-version: r25c # Stable NDK version for Godot 4 extensions

    - name: Compile godot-cpp Bindings (Debug)
      run: |
        cd godot-cpp
        scons platform=android arch=arm64 target=template_debug
        cd ..

    - name: Compile godot-cpp Bindings (Release)
      run: |
        cd godot-cpp
        scons platform=android arch=arm64 target=template_release
        cd ..

    - name: Build Binary Patcher Plugin (Debug)
      run: |
        scons platform=android arch=arm64 target=template_debug

    - name: Build Binary Patcher Plugin (Release)
      run: |
        scons platform=android arch=arm64 target=template_release

    - name: Upload Android Binaries Artifact
      uses: actions/upload-artifact@v4
      with:
        name: godot-binary-patcher-android-binaries
        path: |
          bin/
          demo/addons/godot-binary-patcher/bin/
        if-no-files-found: warn
