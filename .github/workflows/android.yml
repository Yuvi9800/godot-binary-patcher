name: 🤖 Android Builds
on: [ workflow_call, workflow_dispatch ]

jobs:
  build:
    name: 🤖 Android ${{ matrix.arch }} ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        platform: [android]
        target: [debug, release]
        arch: [arm64, arm32]

    steps:
      - name: Checkout Terrain3D
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Base Dependencies
        uses: ./.github/actions/base-deps
        with:
            platform: ${{ matrix.platform }}

      - name: Setup Build Cache
        uses: ./.github/actions/build-cache
        with:
          cache-name: ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.target }}
        continue-on-error: true

      - name: Build Terrain3D
        env:
            SCONS_CACHE: "${{ github.workspace }}/.scons-cache/"
            TARGET: 'template_${{ matrix.target }}'
            ARCH: '${{ matrix.arch }}'
        shell: sh
        run: |
          # 1. Point SCons to the GitHub Runner's pre-installed Android NDK
          # GitHub Ubuntu runners store default NDKs under $ANDROID_HOME/ndk
          # We pick the first available version dynamically
          export ANDROID_NDK_ROOT=$(ls -d $ANDROID_HOME/ndk/* | head -n 1)
          echo "Using Android NDK located at: $ANDROID_NDK_ROOT"
          
          # 2. Build/Generate godot-cpp bindings first so headers like node.hpp exist
          if [ -d "godot-cpp" ]; then
            cd godot-cpp
            scons platform='${{ matrix.platform }}' target=$TARGET arch=$ARCH generate_bindings=yes -j2
            cd ..
          fi

          # 3. Build your actual GDExtension plugin using the proper cross-compiler
          scons target=$TARGET platform='${{ matrix.platform }}' arch=$ARCH debug_symbols=no -j2

      - name: Prepare Files
        shell: sh
        run: |
          ls -l addons/godot-binary-patcher/bin/ || true
          rm -v addons/*.* || true
          cp -v '${{ github.workspace }}/README.md' '${{ github.workspace }}/LICENSE.txt' ${{ github.workspace }}/project/addons/terrain_3d/ || true

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          include-hidden-files: true
          name: t3d-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.target }}
          path: |
            ${{ github.workspace }}/addons/

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          include-hidden-files: true
          name: ${{ github.event.repository.name }}
          pattern: t3d-*
          delete-merged: true
